<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Activities Directory</title>
<style>
  /* ── Tokens ── */
  :root {
    --navy:    #1B2B4B;
    --navy-2:  #243455;
    --teal:    #2A9D8F;
    --teal-lt: #E6F5F3;
    --gold:    #E9C46A;
    --white:   #FAFAF8;
    --gray-1:  #F2F2EF;
    --gray-2:  #E0E0DA;
    --gray-3:  #A0A098;
    --gray-4:  #5C5C56;
    --text:    #1A1A18;
    --radius:  14px;
    --shadow:  0 2px 12px rgba(27,43,75,.10);
    --shadow-lg: 0 8px 40px rgba(27,43,75,.18);
    --sans: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    background: var(--gray-1);
    color: var(--text);
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  header {
    background: var(--navy);
    color: #fff;
    padding: 18px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .header-title { font-size: 1.25rem; font-weight: 700; letter-spacing: -.01em; }
  .header-subtitle { font-size: .72rem; color: var(--gold); letter-spacing: .08em; text-transform: uppercase; }
  .header-count {
    background: var(--teal);
    color: #fff;
    font-size: .78rem;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
  }
  .search-bar {
    display: flex;
    gap: 8px;
  }
  .search-bar input {
    flex: 1;
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 10px;
    color: #fff;
    font-size: .9rem;
    padding: 8px 12px;
    outline: none;
    font-family: var(--sans);
  }
  .search-bar input::placeholder { color: rgba(255,255,255,.5); }
  .search-bar input:focus { border-color: var(--teal); background: rgba(255,255,255,.18); }

  /* ── Category Chips ── */
  .chips-wrapper {
    background: var(--navy-2);
    padding: 10px 16px;
    overflow-x: auto;
    display: flex;
    gap: 8px;
    scrollbar-width: none;
  }
  .chips-wrapper::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.15);
    color: rgba(255,255,255,.8);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: .78rem;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .chip:hover { background: rgba(255,255,255,.18); }
  .chip.active { background: var(--teal); border-color: var(--teal); color: #fff; }

  /* ── Grid ── */
  .grid {
    padding: 16px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }
  @media (min-width: 540px) { .grid { grid-template-columns: 1fr 1fr; } }
  @media (min-width: 900px) { .grid { grid-template-columns: 1fr 1fr 1fr; } }

  /* ── Card ── */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .card:active { transform: scale(.98); }
  .card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
  .card-color-band {
    height: 5px;
    background: var(--teal);
  }
  .card-body { padding: 14px 16px 12px; flex: 1; }
  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .card-category {
    font-size: .68rem;
    font-weight: 700;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--teal);
  }
  .card-price {
    font-size: .78rem;
    font-weight: 600;
    color: var(--gray-4);
  }
  .card-name {
    font-size: 1rem;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.25;
    margin-bottom: 5px;
  }
  .card-location {
    font-size: .78rem;
    color: var(--gray-3);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .card-footer {
    padding: 10px 16px 12px;
    border-top: 1px solid var(--gray-2);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-contact { font-size: .72rem; color: var(--gray-3); }
  .card-arrow {
    width: 28px; height: 28px;
    background: var(--teal-lt);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--teal);
    font-size: .9rem;
  }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray-3);
    grid-column: 1/-1;
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
  .empty-title { font-size: 1rem; font-weight: 600; color: var(--gray-4); margin-bottom: 6px; }

  /* ── FAB (Add) ── */
  .fab {
    position: fixed;
    bottom: calc(24px + env(safe-area-inset-bottom));
    right: 20px;
    z-index: 200;
    width: 56px; height: 56px;
    background: var(--teal);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 1.6rem;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(42,157,143,.45);
    display: flex; align-items: center; justify-content: center;
    transition: transform .15s, background .15s;
  }
  .fab:active { transform: scale(.93); }

  /* ── Detail Drawer ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 300;
    backdrop-filter: blur(2px);
  }
  .overlay.open { display: block; animation: fadeIn .2s; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .drawer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 400;
    background: var(--white);
    border-radius: 20px 20px 0 0;
    box-shadow: var(--shadow-lg);
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(.32,.72,0,1);
    max-height: 92dvh;
    overflow-y: auto;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .drawer.open { transform: translateY(0); }

  .drawer-handle {
    width: 36px; height: 4px;
    background: var(--gray-2);
    border-radius: 2px;
    margin: 12px auto 0;
  }
  .drawer-header {
    padding: 16px 20px 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .drawer-close {
    flex-shrink: 0;
    width: 32px; height: 32px;
    background: var(--gray-2);
    border: none;
    border-radius: 50%;
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--gray-4);
    margin-top: 2px;
  }
  .drawer-category {
    font-size: .7rem;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 4px;
  }
  .drawer-name {
    font-size: 1.3rem;
    font-weight: 800;
    color: var(--navy);
    line-height: 1.2;
  }
  .drawer-section {
    padding: 0 20px;
    margin-top: 16px;
  }
  .drawer-section-label {
    font-size: .68rem;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--gray-3);
    margin-bottom: 5px;
  }
  .drawer-section-value {
    font-size: .92rem;
    color: var(--text);
    line-height: 1.5;
  }
  .drawer-divider {
    height: 1px;
    background: var(--gray-2);
    margin: 16px 20px 0;
  }
  .drawer-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 0 20px;
    margin-top: 16px;
  }
  .drawer-actions {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 4px;
  }
  .btn-book {
    background: var(--teal);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
    display: block;
    font-family: var(--sans);
    transition: background .15s;
  }
  .btn-book:active { background: #238a7d; }
  .btn-edit {
    background: var(--gray-1);
    color: var(--navy);
    border: none;
    border-radius: 12px;
    padding: 13px;
    font-size: .9rem;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--sans);
    transition: background .15s;
  }
  .btn-delete {
    background: none;
    color: #C0392B;
    border: none;
    font-size: .85rem;
    font-weight: 600;
    cursor: pointer;
    padding: 8px;
    font-family: var(--sans);
  }

  /* ── Modal (Add / Edit form) ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 500;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-height: 95dvh;
    overflow-y: auto;
    padding: 0 0 calc(24px + env(safe-area-inset-bottom));
    animation: slideUp .3s cubic-bezier(.32,.72,0,1);
  }
  @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-handle {
    width: 36px; height: 4px;
    background: var(--gray-2);
    border-radius: 2px;
    margin: 12px auto 0;
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--gray-2);
  }
  .modal-title { font-size: 1.1rem; font-weight: 700; color: var(--navy); }
  .modal-cancel {
    background: none; border: none;
    color: var(--teal); font-size: .95rem;
    font-weight: 600; cursor: pointer;
    font-family: var(--sans);
  }
  .form-group { padding: 14px 20px 0; }
  .form-label {
    display: block;
    font-size: .73rem;
    font-weight: 700;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--gray-3);
    margin-bottom: 6px;
  }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--gray-1);
    border: 1.5px solid var(--gray-2);
    border-radius: 10px;
    padding: 11px 13px;
    font-size: .92rem;
    color: var(--text);
    font-family: var(--sans);
    outline: none;
    transition: border-color .15s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--teal);
    background: #fff;
  }
  .form-textarea { min-height: 80px; resize: vertical; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0 12px; }
  .form-row .form-group { padding-left: 0; padding-right: 0; }
  .form-row-wrap { padding: 0 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 0 12px; }
  .btn-save {
    display: block;
    width: calc(100% - 40px);
    margin: 20px auto 0;
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    font-family: var(--sans);
    transition: background .15s;
  }
  .btn-save:active { background: #131f38; }

  /* Category color bands */
  .band-water    { background: #2196F3; }
  .band-land     { background: #4CAF50; }
  .band-air      { background: #9C27B0; }
  .band-culture  { background: #FF9800; }
  .band-wellness { background: #E91E63; }
  .band-dining   { background: #795548; }
  .band-default  { background: var(--teal); }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="header-subtitle">Turtle Bay · Ritz-Carlton</div>
      <div class="header-title">Activities Directory</div>
    </div>
    <div class="header-count" id="count-badge">0 activities</div>
  </div>
  <div class="search-bar">
    <input type="search" id="search-input" placeholder="Search activities…" />
  </div>
</header>

<div class="chips-wrapper" id="chips"></div>
<div class="grid" id="grid"></div>

<button class="fab" id="fab-add" title="Add activity">＋</button>

<!-- Detail Drawer -->
<div class="overlay" id="drawer-overlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <div>
      <div class="drawer-category" id="d-category"></div>
      <div class="drawer-name" id="d-name"></div>
    </div>
    <button class="drawer-close" id="drawer-close">✕</button>
  </div>

  <div class="drawer-section">
    <div class="drawer-section-label">Description</div>
    <div class="drawer-section-value" id="d-desc"></div>
  </div>

  <div class="drawer-divider"></div>
  <div class="drawer-row">
    <div>
      <div class="drawer-section-label">Location</div>
      <div class="drawer-section-value" id="d-location"></div>
    </div>
    <div>
      <div class="drawer-section-label">Pricing</div>
      <div class="drawer-section-value" id="d-price"></div>
    </div>
  </div>

  <div class="drawer-section" style="margin-top:16px;">
    <div class="drawer-section-label">Contact</div>
    <div class="drawer-section-value" id="d-contact"></div>
  </div>

  <div class="drawer-divider"></div>
  <div class="drawer-section" style="margin-top:16px;">
    <div class="drawer-section-label">Booking URL</div>
    <div class="drawer-section-value" id="d-url" style="word-break:break-all;color:var(--teal);font-size:.82rem;"></div>
  </div>

  <div class="drawer-actions">
    <a id="d-book-btn" href="#" target="_blank" rel="noopener" class="btn-book">Open Booking Site →</a>
    <button class="btn-edit" id="d-edit-btn">Edit Activity</button>
    <button class="btn-delete" id="d-delete-btn">Delete Activity</button>
  </div>
</div>

<!-- Add / Edit Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Add Activity</div>
      <button class="modal-cancel" id="modal-cancel">Cancel</button>
    </div>

    <div class="form-group">
      <label class="form-label">Activity Name *</label>
      <input class="form-input" id="f-name" type="text" placeholder="e.g. Sunset Kayak Tour" />
    </div>

    <div class="form-group">
      <label class="form-label">Category *</label>
      <select class="form-select" id="f-category">
        <option value="">— Select category —</option>
        <option>Water</option>
        <option>Land</option>
        <option>Air</option>
        <option>Culture</option>
        <option>Wellness</option>
        <option>Dining</option>
        <option>Other</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Description / Notes</label>
      <textarea class="form-textarea" id="f-desc" placeholder="What should guests know?"></textarea>
    </div>

    <div class="form-row-wrap">
      <div class="form-group">
        <label class="form-label">Location / Venue</label>
        <input class="form-input" id="f-location" type="text" placeholder="e.g. North Shore Beach" />
      </div>
      <div class="form-group">
        <label class="form-label">Pricing</label>
        <input class="form-input" id="f-price" type="text" placeholder="e.g. $89/person" />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Contact Info</label>
      <input class="form-input" id="f-contact" type="text" placeholder="e.g. (808) 555-0100 · info@tour.com" />
    </div>

    <div class="form-group">
      <label class="form-label">Booking Website URL *</label>
      <input class="form-input" id="f-url" type="url" placeholder="https://…" />
    </div>

    <button class="btn-save" id="modal-save">Save Activity</button>
  </div>
</div>

<script>
// ── Storage ──────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'hotel_activities_v1';

function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function save(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ── State ─────────────────────────────────────────────────────────────────────
let activities = load();
let activeCategory = 'All';
let searchQuery = '';
let drawerIndex = null;
let editingId = null;

// Seed demo data if empty
if (activities.length === 0) {
  activities = [
    { id: uid(), name: 'Sunset Kayak Tour', category: 'Water', desc: 'Guided kayak tour along the North Shore coastline at sunset. All skill levels welcome. Equipment provided.', location: 'Turtle Bay Beach Launch', price: '$89/person', contact: '(808) 293-0100', url: 'https://example.com/kayak' },
    { id: uid(), name: 'Horseback Riding', category: 'Land', desc: 'Trail rides through ranch land with ocean views. 1-hour and 2-hour options available.', location: 'Gunstock Ranch, Laie', price: '$75–$120/person', contact: '(808) 237-8515', url: 'https://gunstockranch.com' },
    { id: uid(), name: 'Helicopter Tour', category: 'Air', desc: 'Doors-off and doors-on helicopter tours over the North Shore, waterfalls, and Oʻahu interior.', location: 'Turtle Bay Helipad', price: 'From $249/person', contact: '(808) 839-4999', url: 'https://example.com/heli' },
    { id: uid(), name: 'Cultural Lei Making', category: 'Culture', desc: 'Traditional Hawaiian lei making class with local artisans. Learn about native plants and floral traditions.', location: 'Turtle Bay Lobby Gardens', price: '$45/person', contact: 'concierge@turtlebay.com', url: 'https://example.com/lei' },
    { id: uid(), name: 'Sunrise Yoga', category: 'Wellness', desc: 'Oceanfront yoga session at sunrise. Mats provided. Suitable for all levels.', location: 'North Shore Beach Lawn', price: '$30/session', contact: '(808) 293-6000', url: 'https://example.com/yoga' },
    { id: uid(), name: 'Surf Lessons', category: 'Water', desc: 'Learn to surf with certified instructors on the North Shore. Board rental included.', location: 'Kuilima Cove', price: '$95/person', contact: '(808) 293-7111', url: 'https://example.com/surf' },
  ];
  save(activities);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function bandClass(cat) {
  const map = { Water:'water', Land:'land', Air:'air', Culture:'culture', Wellness:'wellness', Dining:'dining' };
  return 'band-' + (map[cat] || 'default');
}

function categories() {
  const cats = [...new Set(activities.map(a => a.category).filter(Boolean))].sort();
  return ['All', ...cats];
}

function filtered() {
  return activities.filter(a => {
    const matchCat = activeCategory === 'All' || a.category === activeCategory;
    const q = searchQuery.toLowerCase();
    const matchQ = !q || [a.name, a.category, a.desc, a.location, a.contact].some(f => f && f.toLowerCase().includes(q));
    return matchCat && matchQ;
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderChips() {
  const chips = document.getElementById('chips');
  chips.innerHTML = categories().map(cat =>
    `<button class="chip${cat === activeCategory ? ' active' : ''}" data-cat="${cat}">${cat}</button>`
  ).join('');
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const items = filtered();

  document.getElementById('count-badge').textContent =
    `${activities.length} activit${activities.length === 1 ? 'y' : 'ies'}`;

  if (items.length === 0) {
    grid.innerHTML = `<div class="empty">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">No activities found</div>
      <div>Try a different search or category</div>
    </div>`;
    return;
  }

  grid.innerHTML = items.map((a, i) => `
    <div class="card" data-id="${a.id}">
      <div class="card-color-band ${bandClass(a.category)}"></div>
      <div class="card-body">
        <div class="card-meta">
          <div class="card-category">${a.category || 'Uncategorized'}</div>
          <div class="card-price">${a.price || ''}</div>
        </div>
        <div class="card-name">${a.name}</div>
        ${a.location ? `<div class="card-location">📍 ${a.location}</div>` : ''}
      </div>
      <div class="card-footer">
        <div class="card-contact">${a.contact || ''}</div>
        <div class="card-arrow">›</div>
      </div>
    </div>
  `).join('');
}

function render() { renderChips(); renderGrid(); }

// ── Drawer ────────────────────────────────────────────────────────────────────
function openDrawer(id) {
  const a = activities.find(x => x.id === id);
  if (!a) return;
  drawerIndex = id;

  document.getElementById('d-category').textContent = a.category || '';
  document.getElementById('d-name').textContent = a.name;
  document.getElementById('d-desc').textContent = a.desc || '—';
  document.getElementById('d-location').textContent = a.location || '—';
  document.getElementById('d-price').textContent = a.price || '—';
  document.getElementById('d-contact').textContent = a.contact || '—';
  document.getElementById('d-url').textContent = a.url || '—';

  const bookBtn = document.getElementById('d-book-btn');
  if (a.url) {
    bookBtn.href = a.url;
    bookBtn.style.opacity = '1';
    bookBtn.style.pointerEvents = '';
  } else {
    bookBtn.href = '#';
    bookBtn.style.opacity = '.4';
    bookBtn.style.pointerEvents = 'none';
  }

  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  document.getElementById('drawer-overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  document.body.style.overflow = '';
  drawerIndex = null;
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(activity = null) {
  editingId = activity ? activity.id : null;
  document.getElementById('modal-title').textContent = activity ? 'Edit Activity' : 'Add Activity';
  document.getElementById('f-name').value = activity?.name || '';
  document.getElementById('f-category').value = activity?.category || '';
  document.getElementById('f-desc').value = activity?.desc || '';
  document.getElementById('f-location').value = activity?.location || '';
  document.getElementById('f-price').value = activity?.price || '';
  document.getElementById('f-contact').value = activity?.contact || '';
  document.getElementById('f-url').value = activity?.url || '';
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('f-name').focus(), 200);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
  editingId = null;
}

function saveActivity() {
  const name = document.getElementById('f-name').value.trim();
  const url  = document.getElementById('f-url').value.trim();
  if (!name) { alert('Activity name is required.'); return; }

  const data = {
    name,
    category: document.getElementById('f-category').value,
    desc:     document.getElementById('f-desc').value.trim(),
    location: document.getElementById('f-location').value.trim(),
    price:    document.getElementById('f-price').value.trim(),
    contact:  document.getElementById('f-contact').value.trim(),
    url,
  };

  if (editingId) {
    const idx = activities.findIndex(a => a.id === editingId);
    if (idx >= 0) activities[idx] = { ...activities[idx], ...data };
  } else {
    activities.push({ id: uid(), ...data });
  }

  save(activities);
  closeModal();
  render();

  // If we edited from drawer, refresh drawer
  if (editingId && drawerIndex === editingId) openDrawer(editingId);
}

// ── Events ────────────────────────────────────────────────────────────────────
document.getElementById('chips').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  activeCategory = chip.dataset.cat;
  render();
});

document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

document.getElementById('grid').addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card) return;
  openDrawer(card.dataset.id);
});

document.getElementById('drawer-overlay').addEventListener('click', closeDrawer);
document.getElementById('drawer-close').addEventListener('click', closeDrawer);

document.getElementById('d-edit-btn').addEventListener('click', () => {
  const a = activities.find(x => x.id === drawerIndex);
  if (a) { closeDrawer(); openModal(a); }
});

document.getElementById('d-delete-btn').addEventListener('click', () => {
  const a = activities.find(x => x.id === drawerIndex);
  if (!a) return;
  if (!confirm(`Delete "${a.name}"? This cannot be undone.`)) return;
  activities = activities.filter(x => x.id !== drawerIndex);
  save(activities);
  closeDrawer();
  render();
});

document.getElementById('fab-add').addEventListener('click', () => openModal());
document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.getElementById('modal-save').addEventListener('click', saveActivity);

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDrawer(); closeModal(); }
});

// ── Init ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
